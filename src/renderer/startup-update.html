<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimMarket</title>
    <style>
      :root {
        --bg: #121212;
        --bg-soft: #171717;
        --line: #242424;
        --text: #f3f3f3;
        --text-soft: #7c7c7c;
        --text-faint: #474747;
        --gold: #c9a84c;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px 30px 24px;
      }

      .startup-shell {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        text-align: center;
      }

      .startup-brand-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .startup-logo-slot {
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .startup-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        display: block;
      }

      .startup-brand {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--gold);
        letter-spacing: 0.08em;
      }

      .startup-status-block {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .startup-message {
        min-height: 16px;
        font-size: 11px;
        letter-spacing: 0.05em;
        color: var(--text-soft);
      }

      .startup-message.is-success {
        color: var(--gold);
      }

      .startup-progress-track {
        width: 100%;
        height: 1.5px;
        background: var(--line);
        border-radius: 999px;
        overflow: hidden;
      }

      .startup-progress-bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: var(--gold);
        transition: width 0.12s linear, background 0.2s ease;
      }

      .startup-footer {
        font-size: 10px;
        color: var(--text-faint);
        letter-spacing: 0.06em;
      }

      .startup-actions {
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      .startup-actions.hidden {
        display: none;
      }

      .startup-btn {
        min-width: 148px;
        min-height: 36px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #1a1a1a;
        color: var(--text);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease, transform 0.12s ease;
      }

      .startup-btn:hover:not(:disabled) {
        border-color: #393939;
      }

      .startup-btn:active:not(:disabled) {
        transform: translateY(1px);
      }

      .startup-btn:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .startup-btn-primary {
        border-color: rgba(201, 168, 76, 0.45);
        background: linear-gradient(180deg, rgba(201, 168, 76, 0.22) 0%, rgba(201, 168, 76, 0.1) 100%);
        color: var(--gold);
      }

      .startup-btn-primary:hover:not(:disabled) {
        border-color: rgba(201, 168, 76, 0.72);
      }
    </style>
  </head>
  <body>
    <main class="startup-shell" aria-label="Buscando actualizaciones">
      <div class="startup-brand-wrap">
        <div class="startup-logo-slot" aria-hidden="true">
          <img class="startup-logo" src="../assets/branding/simmarket-mark-1024.png?v=4" alt="SimMarket" />
        </div>
        <div class="startup-brand">SimMarket</div>
      </div>

      <div class="startup-status-block">
        <div id="message" class="startup-message">Iniciando...</div>
        <div class="startup-progress-track">
          <div id="progressBar" class="startup-progress-bar"></div>
        </div>
      </div>

      <div id="version" class="startup-footer">v1.0.3</div>

      <div id="actions" class="startup-actions hidden">
        <button id="secondaryAction" class="startup-btn" type="button">Entrar sin actualizar</button>
        <button id="primaryAction" class="startup-btn startup-btn-primary" type="button">Actualizar ahora</button>
      </div>
    </main>

    <script>
      const VERSION = new URLSearchParams(window.location.search).get("version") || "1.0.3";
      const TOTAL_MS = 3000;
      const TEXT_PHASE_MS = 1500;
      const PROGRESS_PHASE_MS = 1500;
      const FINAL_MESSAGE = "Listo para abrir.";
      const lines = [
        "Iniciando proceso...",
        "Leyendo configuración...",
        "Inicializando storage...",
        "Cargando catálogo de recursos...",
        "Verificando grupos de activos...",
        "Conectando con SimCompanies...",
        "Resolviendo endpoint...",
        "Consultando versión remota...",
        "Comparando versión local...",
        "Preparando SimMarket..."
      ];

      const message = document.getElementById("message");
      const progressBar = document.getElementById("progressBar");
      const version = document.getElementById("version");
      const actions = document.getElementById("actions");
      const primaryAction = document.getElementById("primaryAction");
      const secondaryAction = document.getElementById("secondaryAction");
      const platform = window.simcoDesktop?.platform || "unknown";
      let liveUpdateState = null;
      let introFinished = false;
      let primaryBusy = false;

      version.textContent = `v${VERSION.replace(/^v/i, "")}`;

      const start = performance.now();

      function showActions(visible) {
        actions.classList.toggle("hidden", !visible);
      }

      function updateActionButtons() {
        const status = String(liveUpdateState?.status || "");
        showActions(introFinished && ["available", "downloading", "downloaded", "installing", "offline"].includes(status));

        secondaryAction.disabled = primaryBusy || status === "installing";
        primaryAction.disabled = primaryBusy || status === "downloading" || status === "installing";

        if (status === "offline") {
          secondaryAction.textContent = "Entrar en modo desconectado";
          primaryAction.textContent = "Reintentar";
        } else {
          secondaryAction.textContent = "Entrar sin actualizar";
        }

        if (status === "downloaded") {
          primaryAction.textContent = platform === "win32" ? "Instalar ahora" : "Descarga abierta";
        } else if (status === "downloading") {
          primaryAction.textContent = `Descargando ${Math.round(Number(liveUpdateState?.progress || 0))}%`;
        } else if (status === "installing") {
          primaryAction.textContent = "Instalando...";
        } else if (status === "offline") {
          primaryAction.textContent = "Reintentar";
        } else {
          primaryAction.textContent = platform === "win32" ? "Actualizar ahora" : "Descargar update";
        }
      }

      function renderFinalState() {
        const status = String(liveUpdateState?.status || "");
        if (status === "checking") {
          message.textContent = "Buscando actualizaciones...";
          message.classList.remove("is-success");
          progressBar.style.width = "100%";
          updateActionButtons();
          return true;
        }
        if (status === "available") {
          message.textContent = "Hay una actualización disponible.";
          message.classList.remove("is-success");
          progressBar.style.width = "100%";
          updateActionButtons();
          return true;
        }
        if (status === "downloading") {
          const progress = Math.max(4, Math.min(100, Number(liveUpdateState?.progress || 0)));
          message.textContent = progress >= 100
            ? "Terminando descarga..."
            : `Descargando update... ${Math.round(progress)}%`;
          message.classList.remove("is-success");
          progressBar.style.width = `${progress}%`;
          updateActionButtons();
          return true;
        }
        if (status === "downloaded") {
          message.textContent = platform === "win32" ? "Update lista para instalar." : "Descarga lista.";
          message.classList.add("is-success");
          progressBar.style.width = "100%";
          updateActionButtons();
          return true;
        }
        if (status === "installing") {
          message.textContent = "Instalando update...";
          message.classList.add("is-success");
          progressBar.style.width = "100%";
          updateActionButtons();
          return true;
        }
        if (status === "offline") {
          message.textContent = "No hay conexion a internet.";
          message.classList.remove("is-success");
          progressBar.style.width = "100%";
          updateActionButtons();
          return true;
        }
        showActions(false);
        return false;
      }

      function tick(now) {
        const elapsed = Math.min(TOTAL_MS, now - start);
        const progress = Math.min(1, elapsed / PROGRESS_PHASE_MS);
        introFinished = elapsed >= TEXT_PHASE_MS;
        if (elapsed >= TEXT_PHASE_MS) {
          message.textContent = String(liveUpdateState?.status || "") === "checking"
            ? "Buscando actualizaciones..."
            : FINAL_MESSAGE;
        } else {
          const lineProgress = elapsed / TEXT_PHASE_MS;
          const lineIndex = Math.min(lines.length - 1, Math.floor(lineProgress * lines.length));
          message.textContent = lines[lineIndex];
        }
        message.classList.toggle("is-success", elapsed >= TEXT_PHASE_MS);
        progressBar.style.width = `${Math.max(3, progress * 100)}%`;
        if (elapsed >= TEXT_PHASE_MS) {
          renderFinalState();
        }
        if (elapsed < TOTAL_MS || ["checking", "available", "downloading", "downloaded", "installing", "offline"].includes(String(liveUpdateState?.status || ""))) {
          requestAnimationFrame(tick);
        }
      }

      if (window.simcoDesktop?.getUpdateState) {
        window.simcoDesktop.getUpdateState().then((payload) => {
          liveUpdateState = payload || null;
        }).catch(() => {});
      }

      if (window.simcoDesktop?.onUpdateState) {
        window.simcoDesktop.onUpdateState((payload) => {
          liveUpdateState = payload || null;
          updateActionButtons();
        });
      }

      primaryAction.addEventListener("click", async () => {
        if (!window.simcoDesktop?.runUpdatePrimaryAction || primaryBusy) return;
        primaryBusy = true;
        updateActionButtons();
        try {
          const nextState = await window.simcoDesktop.runUpdatePrimaryAction();
          liveUpdateState = nextState || liveUpdateState;
        } catch (error) {
          message.textContent = error?.message || "No se pudo iniciar la actualización.";
          message.classList.remove("is-success");
        } finally {
          primaryBusy = false;
          updateActionButtons();
        }
      });

      secondaryAction.addEventListener("click", async () => {
        if (!window.simcoDesktop?.continueStartup) return;
        secondaryAction.disabled = true;
        try {
          await window.simcoDesktop.continueStartup();
        } catch (error) {
          secondaryAction.disabled = false;
        }
      });

      requestAnimationFrame(tick);
    </script>
  </body>
</html>
